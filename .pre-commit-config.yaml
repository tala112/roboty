repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
      - id: go-build
        name: go build
        entry: go build ./...
        language: system
        pass_filenames: false
      - id: critical-tests
        name: critical safety tests
        entry: go test -run TestCritical -count=1 ./internal/modes/
        language: system
        pass_filenames: false
      - id: go-unit-tests
        name: unit tests
        entry: go test -short -count=1 ./internal/...
        language: system
        pass_filenames: false
