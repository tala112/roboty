name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Build internal packages
        run: go build ./internal/...
      - name: Vet
        run: go vet ./internal/...
      - name: Unit tests
        run: go test -count=1 -short ./internal/...
      - name: Safety-critical tests
        run: go test -count=1 -run 'TestCritical|TestChaos|TestWhitelist' ./internal/modes/
      - name: Whitelist sync check
        run: go test -count=1 -run TestCritical_WhitelistSyncWithSystemCritical ./internal/modes/
      - name: Fuzz tests
        run: |
          go test -fuzz=FuzzNormalizeKillExec -fuzztime=15s ./internal/modes/
          go test -fuzz=FuzzIsAlwaysAllowed -fuzztime=15s ./internal/modes/
          go test -fuzz=FuzzIsAllowed -fuzztime=15s ./internal/modes/
