name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Build internal packages
        run: go build ./internal/...
      - name: Vet
        run: go vet ./internal/...
      - name: Unit tests
        run: go test -count=1 -short ./internal/...
      - name: Safety-critical tests
        run: go test -count=1 -timeout=120s -run 'TestCritical|TestChaos|TestWhitelist' ./internal/modes/
      - name: Whitelist sync check
        run: go test -count=1 -timeout=30s -run TestCritical_WhitelistSyncWithSystemCritical ./internal/modes/
      - name: Fuzz NormalizeKillExec
        run: go test -fuzz=FuzzNormalizeKillExec -fuzztime=500x -timeout=30s ./internal/modes/
      - name: Fuzz IsAlwaysAllowed
        run: go test -fuzz=FuzzIsAlwaysAllowed -fuzztime=500x -timeout=30s ./internal/modes/
      - name: Fuzz IsAllowed
        run: go test -fuzz=FuzzIsAllowed -fuzztime=500x -timeout=30s ./internal/modes/
