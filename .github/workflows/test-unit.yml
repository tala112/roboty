name: Unit & Safety Tests
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CGO_ENABLED: 1   # required for -race; default on Linux/macOS, needs MinGW on Windows

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Install MinGW (Windows, for race detector)
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install mingw -y --no-progress
      - name: Check CGO availability
        id: cgo_check
        shell: bash
        run: |
          echo "CGO_ENABLED=$(go env CGO_ENABLED)"
          if command -v gcc &>/dev/null; then echo "gcc=yes"; else echo "gcc=no"; fi
      - name: Build (internal only — frontend embed requires frontend dist)
        run: go build -v ./internal/...
      - name: Vet (internal only — frontend embed requires frontend dist)
        run: go vet ./internal/...
      - name: Unit tests (with race detector when available)
        shell: bash
        run: |
          if command -v gcc &>/dev/null; then
            go test -v -race -count=1 -short ./internal/...
          else
            echo "WARNING: no gcc found — skipping race detector, running without -race"
            go test -v -count=1 -short ./internal/...
          fi
      - name: Platform safety-critical tests (ancestor protection, whitelist sync, kill safety)
        run: go test -v -count=1 -run 'TestCritical|TestChaos|TestWhitelist' ./internal/modes/
      - name: Whitelist sync check (safety.go vs whitelist.json)
        run: go test -v -count=1 -run TestCritical_WhitelistSyncWithSystemCritical ./internal/modes/
      - name: Fuzz tests (30s per target)
        run: |
          go test -fuzz=FuzzNormalizeKillExec -fuzztime=30s ./internal/modes/
          go test -fuzz=FuzzIsAlwaysAllowed -fuzztime=30s ./internal/modes/
          go test -fuzz=FuzzIsAllowed -fuzztime=30s ./internal/modes/
