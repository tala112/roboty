name: Unit & Safety Tests
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: Build
        run: go build -v ./...
      - name: Vet
        run: go vet ./...
      - name: Unit tests
        run: go test -v -race -count=1 -short ./internal/...
      - name: Safety-critical tests
        run: go test -v -count=1 -run TestCritical ./internal/modes/
      - name: Fuzz tests (short)
        run: go test -fuzz=FuzzNormalizeKillExec -fuzztime=10s ./internal/modes/
